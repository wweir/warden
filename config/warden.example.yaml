addr: ":9832"

# Admin password for /_admin/. Empty means disabled.
# admin_password: "your-secret-password"

# Optional webhook targets for log push and hook callbacks.
# webhook:
#   audit-webhook:
#     url: "https://your-log-sink/api/ingest"
#     method: POST
#     headers:
#       Authorization: "Bearer your-token"
#       X-Source: "warden"
#     body_template: |
#       {
#         "request_id": "{{ .Record.RequestID }}",
#         "route": "{{ .Record.Route }}",
#         "provider": "{{ .Record.Provider }}"
#       }
#     timeout: "5s"
#     retry: 2

# Optional request/response logging.
# log:
#   targets:
#     - type: file
#       dir: "./logs"
#     - type: http
#       webhook: "audit-webhook"

# Optional embedded CLIProxyAPI/cliproxy runtime. When enabled, Warden starts
# one local cliproxy service using the loopback endpoint declared by
# provider.*.url on cliproxy-backed providers.
# cliproxy:
#   enabled: true
#   auth_dir: "~/.cli-proxy-api"
#   # proxy: "socks5://127.0.0.1:1080"
#   # request_retry: 2
#   # max_retry_credentials: 0

# Upstream providers. family is required; protocol remains only as a
# backward-compatible alias for older configs.
provider:
  openai:
    family: "openai"
    url: "https://api.openai.com/v1"
    api_key: "${OPENAI_API_KEY}"
    timeout: "120s"
    # disabled: true  # manually suppress this provider from receiving traffic
    # responses_to_chat: true

  anthropic:
    family: "anthropic"
    url: "https://api.anthropic.com/v1"
    api_key: "${ANTHROPIC_API_KEY}"
    timeout: "120s"

  qwen:
    family: "qwen"
    timeout: "120s"
    models:
      - "qwen3-coder-plus"
      - "qwen3-coder-flash"
      - "vision-model"

  copilot:
    family: "copilot"
    timeout: "120s"
    models:
      # Strong premium models
      - "gpt-5.4"
      - "gpt-5.3-codex"
      - "claude-opus-4-6"
      - "claude-sonnet-4-6"
      # Strong free models
      - "gpt-5-mini"
      - "goldeneye"
      - "raptor-mini"
      - "grok-code-fast-1"

  # CLIProxyAPI/cliproxy sidecar example. Warden still talks to it as an
  # OpenAI-compatible upstream; cliproxy owns Codex authentication/execution.
  # codex:
  #   family: "openai"
  #   backend: "cliproxy"
  #   backend_provider: "codex"
  #   url: "http://127.0.0.1:18741/v1"
  #   service_protocols: ["chat"]
  #   timeout: "120s"
  #   models:
  #     - "gpt-5.3-codex"

# Route-centric config: each route locks exactly one protocol.
route:
  /openai:
    protocol: "chat"
    # Optional client API keys for this route only.
    # Empty or omitted means the route is public.
    # api_keys:
    #   my-app: "generated-api-key"
    #   cli: "another-api-key"
    exact_models:
      gpt-4o:
        prompt_enabled: true
        system_prompt: "You are a helpful assistant."
        upstreams:
          - provider: "openai"
            model: "gpt-4o"
          - provider: "qwen"
            model: "qwen3-coder-plus"
          - provider: "copilot"
            model: "gpt-5.4"
      gpt-4o-mini:
        upstreams:
          - provider: "openai"
            model: "gpt-4.1-mini"
          - provider: "qwen"
            model: "qwen3-coder-flash"
          - provider: "copilot"
            model: "claude-sonnet-4-6"
    wildcard_models:
      "gpt-*":
        providers:
          - "openai"
          - "qwen"
          - "copilot"

  /responses:
    protocol: "responses_stateless"
    exact_models:
      gpt-4o:
        prompt_enabled: true
        system_prompt: "You are a helpful assistant."
        upstreams:
          - provider: "openai"
            model: "gpt-4o"
          - provider: "copilot"
            model: "gpt-5.4"
      gpt-4o-mini:
        upstreams:
          - provider: "openai"
            model: "gpt-4.1-mini"
          - provider: "copilot"
            model: "claude-sonnet-4-6"
    wildcard_models:
      "gpt-*":
        providers:
          - "openai"
          - "copilot"

  /responses-stateful:
    protocol: "responses_stateful"
    exact_models:
      gpt-4o:
        upstreams:
          - provider: "openai"
            model: "gpt-4o"

  /anthropic:
    protocol: "anthropic"
    exact_models:
      claude-sonnet-4:
        upstreams:
          - provider: "anthropic"
            model: "claude-sonnet-4"

