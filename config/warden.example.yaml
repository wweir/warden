addr: ":8080"

# Admin panel password (empty to disable admin UI at /_admin/)
# admin_password: "your-secret-password"

# Webhook configurations for HTTP log push targets
# webhook:
#   my-log-sink:
#     url: "https://your-log-sink/api/ingest"
#     method: POST                           # optional, default POST
#     headers:
#       Authorization: "Bearer your-token"
#       X-Source: "warden"
#     # body_template: Go template for request body.
#     # - log target: .Record exposes all fields of the log record
#     # - tool hook http: .CallContext / .Args expose tool call context
#     # Omit body_template to send caller default JSON.
#     body_template: |
#       {
#         "timestamp": "{{ .Record.Timestamp | date `2006-01-02T15:04:05Z07:00` }}",
#         "request_id": "{{ .Record.RequestID }}",
#         "route": "{{ .Record.Route }}",
#         "model": "{{ .Record.Model }}",
#         "provider": "{{ .Record.Provider }}",
#         "duration_ms": {{ .Record.DurationMs }},
#         "error": "{{ .Record.Error }}"
#       }
#     timeout: "5s"                          # optional, default 5s
#     retry: 2                               # optional, default 2

# Request/response logging targets (file and/or http)
# log:
#   targets:
#     - type: file
#       dir: "./logs"
#     - type: http
#       webhook: "my-log-sink"              # references webhook above

# SSH connection configurations for remote credential access and MCP execution
# ssh:
#   dev-server:
#     host: "dev-server"                    # ~/.ssh/config Host entry or user@hostname
#     port: 22                              # optional (default: ssh config)
#     user: "deploy"                        # optional (default: ssh config)
#     identity_file: "~/.ssh/id_ed25519"   # optional (default: ssh config)

# Provider 配置 - 上游 LLM API 地址和认证信息
# timeout: first-token timeout for non-streaming requests (waiting for response headers).
#          Streaming requests use a fixed 30s first-token timeout.
#          After headers received, body reading has no time limit.
provider:
  openai-fast:
    url: "https://api.openai.com/v1"
    protocol: "openai"
    api_key: "${OPENAI_API_KEY}"
    timeout: "60s" # non-streaming first-token timeout
    # proxy: "socks5://127.0.0.1:1080"      # optional HTTP/SOCKS proxy

  openai:
    url: "https://api.openai.com/v1"
    protocol: "openai"
    api_key: "${OPENAI_API_KEY}"
    timeout: "120s" # non-streaming first-token timeout
    # chat_to_responses: true              # route chat/completions to upstream /responses endpoint
    # enables Responses API features (web search, file search, etc.)
    # requires protocol: "openai"

  anthropic:
    url: "https://api.anthropic.com/v1"
    protocol: "anthropic"
    api_key: "${ANTHROPIC_API_KEY}"
    timeout: "120s"
    # request_patch applies JSON Patch (RFC 6902) operations to each request body before forwarding.
    # Useful for stripping fields unsupported by a specific upstream (e.g. extended thinking).
    # request_patch:
    #   - op: "remove"
    #     path: "/thinking"
    #   - op: "replace"
    #     path: "/max_tokens"
    #     value: 8192

  anthropic-fallback:
    url: "https://api.anthropic.com/v1"
    protocol: "anthropic"
    api_key: "${ANTHROPIC_API_KEY}"
    timeout: "180s" # longer timeout for slow/fallback providers

  ollama:
    url: "http://localhost:11434/v1"
    protocol: "ollama"
    timeout: "180s" # local models may be slow
    # model_aliases: alias_name = real_name, alias appears in /models and is resolved before upstream request
    # model_aliases:
    #   gpt-4o: "llama3.3"

  qwen:
    protocol: "qwen"
    # url: "https://portal.qwen.ai/v1"  # default (OAuth); set api_key to use dashscope instead
    # config_dir: "~/.qwen"  # default
    timeout: "120s"
    models:
      - "qwen3-coder-plus"
      - "qwen3-coder-flash"
      - "vision-model"

  copilot:
    protocol: "copilot"
    # url: "https://api.githubcopilot.com"  # default
    # config_dir: "~/.config/github-copilot"  # default; reads hosts.json or apps.json
    timeout: "120s"
    models:
      - "gpt-4o"
      - "claude-sonnet-4"
      - "o3-mini"
      - "gemini-2.0-flash"

# 路由配置 - 路由前缀与工具绑定
route:
  /openai:
    providers:
      - "openai"
    tools:
      - "web-search"

  /anthropic:
    providers:
      - "anthropic"
    tools:
      - "web-search"
      - "filesystem"
    # system_prompts: inject a system prompt for specific models (exact match)
    # system_prompts:
    #   claude-sonnet-4-5-20250929: "You are a helpful assistant."

  /ollama:
    providers:
      - "ollama"
    tools: []

# 全局 tool hooks（对任意 tool call 生效）
# match 匹配的是完整工具名：
# - 注入 MCP 工具：<mcp_name>__<tool_name>
# - 客户端工具：<tool_name>
# 支持 * 通配符，例如 "filesystem__*"、"web_*"、"*"
# tool_hooks:
#   - match: "filesystem__write_*"
#     hook:
#       type: exec
#       when: pre
#       timeout: "3s"
#       command: "/usr/local/bin/check-write-permission"
#       args: []
#   - match: "web_search"
#     hook:
#       type: ai
#       when: pre
#       timeout: "15s"
#       route: "/openai"
#       model: "gpt-4o-mini"
#       prompt: |
#         You are a security reviewer for tool calls.
#         Return JSON only: {"allow": true/false, "reason": "short reason"}
#         Default to allow=false if risk is unclear.
#         Focus on command execution, secret leakage, privacy violations, malicious downloads,
#         data exfiltration, and destructive or over-broad actions.
#         Tool: {{.FullName}}
#         Arguments: {{.Arguments}}
#   - match: "filesystem__delete_file"
#     hook:
#       type: http
#       when: pre
#       timeout: "5s"
#       webhook: "audit-webhook"   # references webhook.<name>; body uses webhook.body_template or default CallContext JSON

# MCP 工具配置 - 启用的 MCP 工具
mcp:
  web-search:
    command: "npx"
    args:
      - "-y"
      - "@anthropic/mcp-server-web-search"
    env:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"

  filesystem:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
    env: {}
    # Per-tool configuration: disable individual tools
    # tools:
    #   write_file:
    #     hooks:
