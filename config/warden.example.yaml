addr: ":8080"

# Admin password for /_admin/. Empty means disabled.
# admin_password: "your-secret-password"

# Client API keys. Empty means no client auth.
# api_keys:
#   my-app: "generated-api-key"
#   cli: "another-api-key"

# Optional webhook targets for log push and hook callbacks.
# webhook:
#   audit-webhook:
#     url: "https://your-log-sink/api/ingest"
#     method: POST
#     headers:
#       Authorization: "Bearer your-token"
#       X-Source: "warden"
#     body_template: |
#       {
#         "request_id": "{{ .Record.RequestID }}",
#         "route": "{{ .Record.Route }}",
#         "provider": "{{ .Record.Provider }}"
#       }
#     timeout: "5s"
#     retry: 2

# Optional request/response logging.
# log:
#   targets:
#     - type: file
#       dir: "./logs"
#     - type: http
#       webhook: "audit-webhook"

# Upstream providers.
provider:
  openai:
    url: "https://api.openai.com/v1"
    protocol: "openai"
    api_key: "${OPENAI_API_KEY}"
    timeout: "120s"
    # chat_to_responses: true
    # responses_to_chat: true

  anthropic:
    url: "https://api.anthropic.com/v1"
    protocol: "anthropic"
    api_key: "${ANTHROPIC_API_KEY}"
    timeout: "120s"

  qwen:
    protocol: "qwen"
    timeout: "120s"
    models:
      - "qwen3-coder-plus"
      - "qwen3-coder-flash"
      - "vision-model"

  copilot:
    protocol: "copilot"
    timeout: "120s"
    models:
      # Strong premium models
      - "gpt-5.4"
      - "gpt-5.3-codex"
      - "claude-opus-4-6"
      - "claude-sonnet-4-6"
      # Strong free models
      - "gpt-5-mini"
      - "goldeneye"
      - "raptor-mini"
      - "grok-code-fast-1"

# Route-centric config: each route exposes one protocol and a public model set.
route:
  /openai:
    protocol: "chat"
    exact_models:
      gpt-4o:
        system_prompt: "You are a helpful assistant."
        upstreams:
          - provider: "openai"
            model: "gpt-4o"
          - provider: "qwen"
            model: "qwen3-coder-plus"
          - provider: "copilot"
            model: "gpt-5.4"
      gpt-4o-mini:
        upstreams:
          - provider: "openai"
            model: "gpt-4.1-mini"
          - provider: "qwen"
            model: "qwen3-coder-flash"
          - provider: "copilot"
            model: "claude-sonnet-4-6"
    wildcard_models:
      "gpt-*":
        providers:
          - "openai"
          - "qwen"
          - "copilot"

  /anthropic:
    protocol: "anthropic"
    exact_models:
      claude-sonnet-4:
        upstreams:
          - provider: "anthropic"
            model: "claude-sonnet-4"

